<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Engine Pro</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .glass { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .dark .glass { background: #0f172a; border-color: #1e293b; color: white; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-5">
    <div class="max-w-md mx-auto space-y-4">
        <h1 class="text-2xl font-black text-blue-600 italic uppercase">Ultra Engine Pro</h1>
        
        <div class="glass space-y-4">
            <input id="sw" placeholder="開始単語" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none border-none font-bold">
            <button onclick="runTest()" id="btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">EXPLORE</button>
            <div id="res" class="text-center font-bold text-blue-500"></div>
        </div>
    </div>

    <script>
        // iPhoneで壊れやすい記号を極力排除したテスト用スクリプト
        async function runTest() {
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            btn.innerText = "LOADING...";
            
            try {
                // app.pyが生きているか確認
                const r = await fetch('/get_dictionary');
                const d = await r.json();
                res.innerText = "SUCCESS: " + d.country.length + " WORDS LOADED";
            } catch (e) {
                res.innerText = "ERROR: " + e.message;
            }
            btn.innerText = "EXPLORE";
        }
    </script>
</body>
</html>
